name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          only-new-issues: true

      - name: Run tests with coverage
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run benchmarks
        run: go test ./internal/bench/ -bench=. -benchmem -count=5 > benchmark.txt

      - name: Generate Markdown report
        run: bash scripts/bench-report.sh benchmark.txt

      - name: Generate HTML report
        run: bash scripts/bench-visualize.sh benchmark.txt bench-report.html

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: |
            benchmark.txt
            bench-report.html
          retention-days: 90

  benchmark-pr:
    name: Benchmark (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: quality
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Run benchmarks
        run: go test ./internal/bench/ -bench=. -benchmem -count=3 > benchmark.txt

      - name: Format benchmark results
        id: bench
        run: |
          {
            echo 'report<<EOF'
            bash scripts/bench-report.sh benchmark.txt 2>&1 | grep -A 999 '=== Uzura'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: benchmark
          message: |
            ## Benchmark Results

            ${{ steps.bench.outputs.report }}

            <sub>Commit: ${{ github.sha }}</sub>
