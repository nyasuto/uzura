version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - gocritic
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks: []
    misspell:
      locale: US
  exclusions:
    presets:
      - std-error-handling
    rules:
      - path: '_test\.go'
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
